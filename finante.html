<!DOCTYPE html>
<html lang="ro">
<head>
  <meta charset="UTF-8">
  <title>EduTok - Finanțe Publice 2</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
  
  <style>
    :root {
      --bg-dark: #020617; 
      --accent: #10b981; 
      --accent-gradient: linear-gradient(135deg, #10b981, #3b82f6);
      --text-main: #f8fafc;
      --text-muted: #94a3b8;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

    html, body {
      width: 100%; height: 100%;
      background-color: var(--bg-dark);
      color: var(--text-main);
      font-family: 'Outfit', sans-serif;
      overflow: hidden; 
      user-select: none; 
    }

    .bg-blobs {
      position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
      z-index: 0; pointer-events: none; overflow: hidden;
    }
    .blob {
      position: absolute; border-radius: 50%; filter: blur(90px); opacity: 0.3;
      animation: float 12s infinite alternate ease-in-out;
    }
    .blob-1 { width: 350px; height: 350px; background: var(--accent); top: -10%; left: -10%; }
    .blob-2 { width: 300px; height: 300px; background: #3b82f6; bottom: -10%; right: -10%; animation-delay: -6s;}

    .feed-container {
      position: relative; z-index: 1;
      height: 100vh; width: 100vw;
      overflow-y: scroll;
      scroll-snap-type: y mandatory;
      -webkit-overflow-scrolling: touch;
      scrollbar-width: none; 
      -ms-overflow-style: none; 
    }
    .feed-container::-webkit-scrollbar { display: none; }

    .snap-card {
      height: 100vh; width: 100vw;
      scroll-snap-align: start;
      scroll-snap-stop: always; 
      position: relative;
      display: flex; align-items: center; justify-content: flex-start;
      padding: 0 18vw 0 6vw; /* Ajustat pentru a lăsa loc de text și butoane */
    }

.glass-panel {
      width: 100%;
      max-height: 82vh; /* Limitează înălțimea să nu iasă din ecran */
      overflow-y: auto; /* Permite scroll în interior dacă e prea lung */
      overscroll-behavior: contain; /* Previne scroll-ul paginii când ajungi la capătul textului */
      background: rgba(255, 255, 255, 0.02);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 32px;
      padding: 35px 25px; /* Padding mai mic pt a lăsa loc de text */
      box-shadow: 0 30px 60px rgba(0,0,0,0.4), inset 0 1px 0 rgba(255,255,255,0.1);
      opacity: 0;
      transform: translateY(50px) scale(0.92);
      transition: all 0.7s cubic-bezier(0.2, 0.8, 0.2, 1);
    }

    /* Design Scrollbar Intern pentru Panou */
    .glass-panel::-webkit-scrollbar { width: 5px; }
    .glass-panel::-webkit-scrollbar-track { background: transparent; }
    .glass-panel::-webkit-scrollbar-thumb { 
      background: rgba(16, 185, 129, 0.4); 
      border-radius: 10px; 
    }

    .snap-card.is-visible .glass-panel {
      opacity: 1; transform: translateY(0) scale(1);
    }

    .category-badge {
      color: var(--accent); font-size: 0.85rem; font-weight: 800;
      text-transform: uppercase; letter-spacing: 2px;
      margin-bottom: 25px; display: flex; align-items: center; gap: 8px;
    }
    .category-badge::before {
      content: ''; display: block; width: 8px; height: 8px;
      background: var(--accent); border-radius: 50%;
      box-shadow: 0 0 12px var(--accent);
    }

    .question {
      font-size: clamp(1.4rem, 6vw, 1.8rem); /* Font Adaptabil automat */
      font-weight: 800; line-height: 1.3;
      margin-bottom: 25px; 
      background: var(--accent-gradient);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      letter-spacing: -0.5px;
    }

    .answer {
      font-size: clamp(1.1rem, 4.5vw, 1.3rem); /* Font Adaptabil automat */
      color: rgba(255,255,255,0.9); line-height: 1.5; font-weight: 400;
      padding-left: 15px; border-left: 3px solid rgba(16, 185, 129, 0.5);
    }

    .action-bar {
      position: absolute; right: 15px; bottom: 15vh;
      display: flex; flex-direction: column; gap: 25px;
      align-items: center; z-index: 10;
    }

    .action-btn {
      background: rgba(255,255,255,0.05); backdrop-filter: blur(10px);
      width: 55px; height: 55px; border-radius: 50%;
      display: flex; justify-content: center; align-items: center;
      font-size: 1.6rem; color: white; border: 1px solid rgba(255,255,255,0.1);
      cursor: pointer; transition: 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }
    .action-btn:active { transform: scale(0.7); }
    .action-btn.liked { 
      background: rgba(239, 68, 68, 0.15); color: #ef4444; 
      border-color: rgba(239, 68, 68, 0.4); 
      box-shadow: 0 0 20px rgba(239, 68, 68, 0.3);
    }
    
    .action-label {
      font-size: 0.75rem; font-weight: 600; margin-top: 8px; text-align: center; color: var(--text-muted);
    }

    .top-bar {
      position: fixed; top: 0; left: 0; width: 100%;
      padding: 20px 25px; display: flex; justify-content: space-between; align-items: center;
      z-index: 1000;
    }
    .close-btn {
      background: rgba(255,255,255,0.1); width: 44px; height: 44px;
      border-radius: 50%; display: grid; place-items: center;
      text-decoration: none; color: white; font-size: 1.2rem;
      backdrop-filter: blur(5px);
    }
    
    .filter-btn {
      background: rgba(255,255,255,0.1); padding: 8px 16px;
      border-radius: 20px; font-size: 0.9rem; font-weight: 600;
      color: white; border: 1px solid rgba(255,255,255,0.1);
      backdrop-filter: blur(5px); cursor: pointer; transition: 0.3s;
    }
    .filter-btn.active {
      background: rgba(239, 68, 68, 0.2); border-color: #ef4444; color: #ef4444;
    }

    .progress-text {
      color: rgba(255,255,255,0.6); font-size: 1rem; font-weight: 700; letter-spacing: 1px;
      background: rgba(0,0,0,0.3); padding: 5px 15px; border-radius: 20px; backdrop-filter: blur(5px);
    }

    .progress-line-container {
      position: fixed; top: 0; left: 0; width: 100%; height: 4px;
      background: rgba(255,255,255,0.05); z-index: 1001;
    }
    .progress-line {
      height: 100%; width: 0%; background: var(--accent-gradient);
      transition: width 0.3s ease; border-radius: 0 4px 4px 0;
    }

    .heart-popup {
      position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%) scale(0);
      font-size: 8rem; color: #ef4444; opacity: 0; pointer-events: none; z-index: 100;
      text-shadow: 0 10px 30px rgba(239, 68, 68, 0.5);
    }
    .heart-popup.animate {
      animation: heartBurst 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
    }

    .empty-state {
      text-align: center; color: var(--text-muted); padding: 40px;
    }
    .empty-state h2 { color: white; margin-bottom: 10px; font-size: 1.8rem;}

    @keyframes float {
      0% { transform: translate(0, 0) scale(1); }
      100% { transform: translate(40px, 60px) scale(1.15); }
    }
    @keyframes heartBurst {
      0% { transform: translate(-50%, -50%) scale(0) rotate(-15deg); opacity: 0; }
      15% { transform: translate(-50%, -50%) scale(1.2) rotate(10deg); opacity: 1; }
      30% { transform: translate(-50%, -50%) scale(1) rotate(0deg); opacity: 1; }
      70% { transform: translate(-50%, -50%) scale(1) translateY(0); opacity: 1; }
      100% { transform: translate(-50%, -50%) scale(1.5) translateY(-50px); opacity: 0; }
    }
  </style>
</head>
<body>

  <div class="bg-blobs">
    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>
  </div>

  <div class="progress-line-container">
    <div class="progress-line" id="progress-line"></div>
  </div>

  <div class="top-bar">
    <a href="index.html" class="close-btn">✕</a>
    <button class="filter-btn" id="filter-btn" onclick="toggleFilter()">Arată doar ❤️</button>
    <div class="progress-text" id="counter">0 / 0</div>
  </div>

  <div class="feed-container" id="feed">
    </div>

  <script>
const facts = [
      { category: "FP - US 1", q: "Care sunt cele două subsisteme ale resurselor financiare publice?", a: "Subsistemul resurselor publice bugetare și Subsistemul resurselor întreprinderilor cu capital de stat și mixte"},
      { category: "FP - US 1", q: "Pe câte subsisteme se structurează sistemul resurselor publice bugetare?", a: "Resursele financiare ale administrației de stat centrale, ale administrațiilor locale și ale asigurărilor sociale de stat"},
      { category: "FP - US 1", q: "De unde provin resursele subsistemului asigurărilor sociale de stat?", a: "De regulă din contribuții pentru asigurări sociale, suportate de patroni și salariați sau a alocației din bugetul de stat"},
      { category: "FP - US 1", q: "Ce se întâmplă când resursele sunt inferioare cheltuielilor statului?", a: "Sistemul resurselor financiare include și resurse procurate sub forma împumutului public, emisiune de monedă, vânzări de active publice etc."},
      { category: "FP - US 1", q: "De unde provin resursele financiare publice extraordinare?", a: "Din împrumuturi de stat și emisiunea (inflaționistă) de monedă. "},
      { category: "FP - US 1", q: "În care sferă a finanțelor publice se încadrează împrumuturile publice de stat?", a: "În sfera relațiilor de credit, statul fiind debitor iar cei care îi acordă, creditori"},
      { category: "FP - US 1", q: "Ce determină emisiunea de monedă?", a: "Determină diminuarea puterii de cumpărare a persoanelor fizice și juridice prin deprecierea veniturilor bănești"},
      { category: "FP - US 1", q: "Care este conținutul economic al resurselor financiare publice?", a: "Resurse:(venituri) fiscale și nefiscale, resurse de trezorerie, împrumutate pe termen mediu și lung și din emisiunea (inflaționistă) de monedă"},   
      { category: "FP - US 1", q: "Ce sunt resursele (veniturile) fiscale?", a: "Sunt procese de redistribuire a PIB-ului sau avuției naționale, de la persoane fizice și juridice la autorități publice, sub forma impozitelor, taxelor sau contribuțiilor. Ele asigură cea mai mare parte a resurselor obișnuite ale statului"},   
      { category: "FP - US 1", q: "Ce sunt resursele nefiscale?", a: "Sunt venituri din exploatarea întreprinderilor și bunurilor statului, dividende, vânzări de active(publice), chirii(redevențe) etc."},   
      { category: "FP - US 1", q: "Ce sunt resursele de trezorerie?", a: "Este mecanismul prin care statul împrumută sau mută banii dintr-o parte în alta pentru a fi mereu capabil să își plătească facturile la timp."},   
      { category: "FP - US 1", q: "Care sunt resursele în cazul unui stat unitar?", a: "Resursele administrației centrale, resursele locale și resursele asigurărilor sociale."},   
      { category: "FP - US 1", q: "Care sunt resursele în cazul unui stat federal?", a: "Resursele statului federal, ale statelor membre, ale entităților administrativ locale din cadrul fiecărui stat federat"},   
      { category: "FP - US 1", q: "În funcție de locul de proveniență cum sunt clasificate resursele finanțelor publice?", a: "Resurse interne și resurse externe."},   
      { category: "FP - US 1", q: "De unde provin resursele interne?", a: "Din distribuirea și redistribuirea PIB-ului și uneori a avuției naționale, se regăsesc ca venituri curente fiscale și nefiscale, venituri de capital dar și împrumuturi publice sau emisiune de monedă."},   
      { category: "FP - US 1", q: "De unde provin resursele externe?", a: "Din redistribuirea produsului creat în afara țării. Formele principale sunt împrumuturile de stat de la instituții bancare, alte guverne, persoane private nerezidente, pe piețe financiare, ajutoare, donații externe."},   
      { category: "FP - US 1", q: "Care sunt formele resurselor financiare publice în raport cu regularitatea folosirii lor?", a: "Resurse ordinare și resurse extraordinare"},   
      { category: "FP - US 1", q: "Resursele financiare mobilizate prin emisiunea şi plasarea de certificate de depozit se încadrează în categoria: ", a: "Resurselor de trezorerie"},
      { category: "FP - US 1", q: "Care sunt trăsăturile împrumuturilor de stat?", a: "Caracterul temporar și reversibilitatea, acordul de voință, transferul dreptului de folosință nu de proprietate, existența unei contraprestații(dobânda), garanția solvabilității statului, conceptul de impozite amânate, operativitatea în procurarea resurselor."},
      { category: "FP - US 2", q: "În ce constă conținutul economic al impozitelor?", a: "În procesele economice de redistribuire, mai ales, a PIB, de la posesorii veniturilor (averilor) către stat, în vederea satisfacerii nevoilor publice."},
      { category: "FP - US 2", q: "Când au apărut primele forme de impozite?", a: "Ele au apărut încă din sclavagism, fiind considerate primele elemente de finanțe publice, deși după unii autori, impozitele moderne au originea în ajutoarele de tip feudal."},
      { category: "FP - US 2", q: "Care sunt impozitele reglementate de Codul Fiscal(Legea 227/2015)", a: "(Alin. 1)Impozitul pe venit, suplimentar, pe venitul microîntreprinderilor, pe venit, pe veniturile obținute din România de nerezidenți, pe reprezentanțe, TVA, accize, impozite și taxe locale, pe construcții,impozitul special pe bunurile imobile și mobile de valoare mare "},  
      { category: "FP - US 2", q: "Care sunt contribuțiile sociale obligatorii reglementate de Codul Fiscal(Legea 227/2015)", a:"(Alin. 2) ontribuțiile de asigurări sociale, datorate bugetului asigurărilor sociale de stat, contribuția de asigurări sociale de sănătate, datorată bugetului Fondului național unic de asigurări sociale de sănătate, contribuția asiguratorie pentru muncă, datorată bugetului general consolidat."},
      { category: "FP - US 2", q: "Care sunt trăsăturile impozitului?", a:"Lipsa contraprestației directe, caracter definitiv al transferului de valoare(nerestituibil/nerambursabil), caracter obligatoriu"},
      { category: "FP - US 2", q: "Cum este privit impozitul în concepția clasică?", a:"impozitul este o prelevare neproductivă folosit pentru finanţarea cheltuielilor publice neproductive(A. Smith și D. Ricardo), 'rău necesar'(Gaston Jéze), rol financiar(Adolf Wagner)"},
      { category: "FP - US 2", q: "Cum este privit impozitul în concepția modernă?", a:"'În neocapitalismul modern, impozitul capătă o semnificatie mai largă; el încetează de a mai constitui grăuntele de nisip care jenează angrenajele, pentru a deveni unul dintre regulatoarele şi motoarele maşinii (Maurice Duverger)', rol financiar și rol interveționist"},
      { category: "FP - US 2", q: "Cu cât a crescut ponderea prelevărilor fiscale în PIB în țările OCDE, între 1965-2023?", a:"a crescut de la 24,9% la 33,7%, o majorare de 8,9 puncte procentuale"},
      { category: "FP - US 2", q: "Care este ponderea ocupată de impozite din totalul veniturilor bugetului public?", a:"De regulă venitul din impozite depășește 80% din total, în numeroase țări depășește și nivelul de 90%"},
      { category: "FP - US 2", q: "Care sunt funcțiile impozitelor?", a:"Funcția de repartiție, Funcția de control și Funcția de reglare/stabilizare a economiei."},
      { category: "FP - US 2", q: "Care sunt rolurile impozitelor?", a:"Asigurarea resurselor financiare necesare pentru acoperirea cheltuielilor publice bugetare, redistribuirea veniturilor (respectiv a PIB) între sfere sau domenii de activitate, ramuri și subramuri economice, redistribuirea pe baze mai echitabile a veniturilor între membrii societății, influențarea vieții economice și sociale, în acord cu obiectivele politicii generale"},
      { category: "FP - US 2", q: "", a:""},
      { category: "FP - US 2", q: "Ce este curba lui Laffer?", a:"Curba lui Laffer ne arată că o creștere a impozitelor nu înseamnă și o creștere a veniturilor, și trebuie găsit un punct de echilibru, lucru dificl totuși în practică. Creșterea impozitelor duce la creșterea veniturilor doar în zona admisibilă, în zona prohibitivă, veniturile scad, crește evaziunea fiscală, descurajează munca, migrarea capitalului."},
    ];

    // Funcția MAGICĂ de amestecare
    function shuffleArray(array) {
      let arr = [...array];
      for (let i = arr.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [arr[i], arr[j]] = [arr[j], arr[i]];
      }
      return arr;
    }

    // --- LOGICA DE MEMORIE (LocalStorage) ---
    function getSavedQuestions() {
      const saved = localStorage.getItem('eduScroll_Favorites');
      return saved ? JSON.parse(saved) : [];
    }

    function saveQuestionsToMemory(arr) {
      localStorage.setItem('eduScroll_Favorites', JSON.stringify(arr));
    }

    // Variabile globale
    let isFilterMode = false;
    let savedQuestionsList = getSavedQuestions();
    const feedContainer = document.getElementById('feed');
    let observer;

    // AICI E REPARATIA CRITICA:
    // Amestecăm cartonașele O SINGURĂ DATĂ, la deschiderea paginii!
    let shuffledFacts = shuffleArray(facts);

    function renderCards() {
      feedContainer.innerHTML = '';
      
      // Folosim variabila amestecată (shuffledFacts), NU 'facts'
      let cardsToShow = shuffledFacts; 
      
      // Dacă filtrul e activ, păstrăm doar favoritele, dar ele vor rămâne în ordinea amestecată curentă
      if (isFilterMode) {
        cardsToShow = shuffledFacts.filter(fact => savedQuestionsList.includes(fact.q));
      }

      if (cardsToShow.length === 0) {
        feedContainer.innerHTML = `
          <div class="snap-card is-visible">
            <div class="glass-panel empty-state">
              <h2>Niciun cartonaș salvat</h2>
              <p>Oprește filtrul, dă scroll și apasă de două ori pe ecran pentru a salva informațiile pe care vrei să le repeți.</p>
            </div>
          </div>
        `;
        document.getElementById('counter').innerText = `0 / 0`;
        document.getElementById('progress-line').style.width = `0%`;
        return;
      }

      cardsToShow.forEach((fact, index) => {
        const card = document.createElement('div');
        card.className = 'snap-card';
        
        const isLiked = savedQuestionsList.includes(fact.q);
        const heartClass = isLiked ? 'liked' : '';
        const heartIcon = isLiked ? '❤️' : '🤍';

        card.innerHTML = `
          <div class="heart-popup">❤️</div>
          <div class="glass-panel">
            <div class="category-badge">${fact.category}</div>
            <div class="question">${fact.q}</div>
            <div class="answer">${fact.a}</div>
          </div>
          
          <div class="action-bar">
            <div>
              <div class="action-btn like-btn ${heartClass}">${heartIcon}</div>
              <div class="action-label">Reține</div>
            </div>
          </div>
        `;
        
        feedContainer.appendChild(card);

        const likeBtn = card.querySelector('.like-btn');
        
        const handleSave = (e) => {
          if(e) e.preventDefault();
          toggleFavorite(fact.q, card, likeBtn);
        };

        likeBtn.addEventListener('click', handleSave);
        
        let lastTap = 0;
        card.addEventListener('touchend', function(e) {
          const currentTime = new Date().getTime();
          const tapLength = currentTime - lastTap;
          if (tapLength < 400 && tapLength > 0) handleSave(e);
          lastTap = currentTime;
        });
        
        card.addEventListener('dblclick', handleSave);
      });

      setupObserver(cardsToShow.length);
    }

    function toggleFavorite(questionText, cardElement, btnElement) {
      const heartPopup = cardElement.querySelector('.heart-popup');
      
      if (savedQuestionsList.includes(questionText)) {
        savedQuestionsList = savedQuestionsList.filter(q => q !== questionText);
        btnElement.classList.remove('liked');
        btnElement.innerHTML = '🤍';
      } else {
        savedQuestionsList.push(questionText);
        btnElement.classList.add('liked');
        btnElement.innerHTML = '❤️';
        
        heartPopup.classList.remove('animate');
        void heartPopup.offsetWidth; 
        heartPopup.classList.add('animate');
        if (navigator.vibrate) navigator.vibrate([30, 50, 30]);
      }
      
      saveQuestionsToMemory(savedQuestionsList);

      if (isFilterMode && !savedQuestionsList.includes(questionText)) {
        renderCards();
      }
    }

    window.toggleFilter = function() {
      const filterBtn = document.getElementById('filter-btn');
      isFilterMode = !isFilterMode; 
      
      if (isFilterMode) {
        filterBtn.classList.add('active');
        filterBtn.innerText = "Vezi Toate";
      } else {
        filterBtn.classList.remove('active');
        filterBtn.innerText = "Arată doar ❤️";
      }
      
      renderCards(); 
    };

    function setupObserver(totalCards) {
      if(observer) observer.disconnect(); 
      
      observer = new IntersectionObserver((entries) => {
        entries.forEach(entry => {
          if (entry.isIntersecting) {
            entry.target.classList.add('is-visible');
            
            const allCards = Array.from(document.querySelectorAll('.snap-card'));
            const index = allCards.indexOf(entry.target) + 1;
            
            document.getElementById('counter').innerText = `${index} / ${totalCards}`;
            const progressPercent = (index / totalCards) * 100;
            document.getElementById('progress-line').style.width = `${progressPercent}%`;
          } else {
            entry.target.classList.remove('is-visible');
          }
        });
      }, { threshold: 0.5 }); 

      document.querySelectorAll('.snap-card').forEach(card => observer.observe(card));
    }

    // PORNIRE APLICAȚIE
    renderCards();

  </script>
</body>
</html>
