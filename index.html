<!DOCTYPE html>
<html lang="ro">
<head>
  <meta charset="UTF-8">
  <title>EduScroll - Învață prin Swipe</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;500;700;800&display=swap" rel="stylesheet">
  
  <style>
    :root {
      --bg-dark: #000000;
      --card-dark: #1e293b;
      --accent: #10b981; /* Verde pentru accent */
      --text-main: #f8fafc;
      --text-muted: #94a3b8;
    }

    /* Reset global pentru a preveni scroll-ul accidental pe body */
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

    html, body {
      width: 100%;
      height: 100%;
      background-color: var(--bg-dark);
      color: var(--text-main);
      font-family: 'Outfit', sans-serif;
      overflow: hidden; /* Blocăm scroll-ul pe pagină, folosim doar containerul */
    }

    /* CONTAINERUL TIKTOK (Optimizat) */
    .feed-container {
      height: 100vh;
      width: 100vw;
      overflow-y: scroll;
      
      /* Magia de stabilizare */
      scroll-snap-type: y mandatory;
      -webkit-overflow-scrolling: touch; /* Scroll fin pe iOS */
      
      /* Ascundem bara de scroll pentru un look curat */
      scrollbar-width: none; /* Firefox */
      -ms-overflow-style: none; /* IE/Edge */
    }
    .feed-container::-webkit-scrollbar {
      display: none; /* Chrome, Safari, Opera */
    }

    /* FIECARE ECRAN (100% din înălțimea telefonului) */
    .snap-card {
      height: 100vh;
      width: 100vw;
      scroll-snap-align: start;
      scroll-snap-stop: always; /* Forțează oprirea pe fiecare element */
      
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
      position: relative;
    }

    /* DESIGN-UL CITATULUI / INFORMAȚIEI */
    .fact-card {
      background: var(--card-dark);
      width: 100%;
      max-width: 420px;
      border-radius: 24px;
      padding: 40px 30px;
      box-shadow: 0 15px 35px rgba(0,0,0,0.6);
      border: 1px solid rgba(255,255,255,0.05);
      position: relative;
      display: flex;
      flex-direction: column;
      
      /* Un fundal subtil gradient pentru profunzime */
      background-image: radial-gradient(circle at top right, rgba(16, 185, 129, 0.05) 0%, transparent 60%);
    }

    .category-badge {
      color: var(--accent);
      font-size: 0.85rem;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 2px;
      margin-bottom: 20px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .category-badge::before {
      content: '';
      display: block;
      width: 8px;
      height: 8px;
      background: var(--accent);
      border-radius: 50%;
    }

    .question {
      font-size: 1.35rem;
      font-weight: 700;
      line-height: 1.4;
      margin-bottom: 25px;
      color: var(--text-main);
    }

    .answer {
      font-size: 1.15rem;
      color: var(--text-muted);
      line-height: 1.5;
      font-weight: 300;
      
      /* Efect de "citat" (o linie în stânga) */
      padding-left: 18px;
      border-left: 3px solid rgba(16, 185, 129, 0.5);
    }

    /* BUTON DE IEȘIRE */
    .close-btn {
      position: fixed;
      top: 25px;
      right: 25px;
      background: rgba(255,255,255,0.1);
      width: 44px;
      height: 44px;
      border-radius: 50%;
      display: grid;
      place-items: center;
      text-decoration: none;
      color: white;
      font-weight: bold;
      z-index: 1000;
      backdrop-filter: blur(5px);
    }

    /* INDICAȚIE SCROLL (Apare doar pe primul card) */
    .swipe-hint {
      position: absolute;
      bottom: 40px;
      left: 50%;
      transform: translateX(-50%);
      color: rgba(255,255,255,0.3);
      font-size: 0.9rem;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 5px;
      animation: bounce 2s infinite;
      pointer-events: none;
    }

    @keyframes bounce {
      0%, 20%, 50%, 80%, 100% { transform: translate(-50%, 0); }
      40% { transform: translate(-50%, -10px); }
      60% { transform: translate(-50%, -5px); }
    }

  </style>
</head>
<body>

  <a href="index.html" class="close-btn">✕</a>

  <div class="feed-container" id="feed">
    </div>

  <script>
    // BAZA DE DATE - Aici pui "Citatele / Conceptele"
    // Le-am formulat direct (Context + Răspuns direct)
    const facts = [
      {
        category: "Drept Civil",
        q: "Atributele dreptului de proprietate",
        a: "Dreptul de proprietate conferă titularului său trei atribute esențiale: Posesia, Folosința și Dispoziția."
      },
      {
        category: "Finanțe",
        q: "Nerespectarea formei 'ad validitatem'",
        a: "Atrage întotdeauna sancțiunea nulității absolute a actului juridic, deoarece forma este cerută pentru însăși valabilitatea sa."
      },
      {
        category: "D.I.E.",
        q: "Aplicabilitatea directă a unei Directive",
        a: "Se recunoaște doar dacă dispozițiile ei sunt clare, precise, neafectate de condiții și dacă nu a fost transpusă în legislația națională în termenul prevăzut."
      },
      {
        category: "Drept Civil",
        q: "Eroarea asupra identității persoanei (intuitu personae)",
        a: "Este considerată o eroare esențială și atrage sancțiunea nulității relative (anularea) actului juridic."
      },
      {
        category: "Finanțe",
        q: "Efectul imobilizării fondurilor de investiții",
        a: "Un nivel cât mai scăzut al acestui indicator exprimă o eficiență economică ridicată (banii se recuperează rapid și nu stau blocați)."
      },
      {
        category: "D.I.E.",
        q: "Comisia Europeană (Demisie)",
        a: "Comisia Europeană în ansamblul ei poate fi demisă doar de către Parlamentul European, prin adoptarea unei moțiuni de cenzură."
      }
    ];

    // Amestecăm informațiile ca să nu te plictisești
    function shuffleArray(array) {
      for (let i = array.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [array[i], array[j]] = [array[j], array[i]];
      }
      return array;
    }

    const feedContainer = document.getElementById('feed');
    const shuffledFacts = shuffleArray([...facts]);

    // Generăm fiecare card în HTML
    shuffledFacts.forEach((fact, index) => {
      const snapCard = document.createElement('div');
      snapCard.className = 'snap-card';

      // Adăugăm animația de "swipe up" doar pe primul element
      const hintHTML = index === 0 ? `<div class="swipe-hint"><span>Swipe sus</span><span>^</span></div>` : '';

      snapCard.innerHTML = `
        <div class="fact-card">
          <div class="category-badge">${fact.category}</div>
          <div class="question">${fact.q}</div>
          <div class="answer">${fact.a}</div>
        </div>
        ${hintHTML}
      `;

      feedContainer.appendChild(snapCard);
    });
  </script>
</body>
</html>
