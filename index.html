<!DOCTYPE html>
<html lang="ro">
<head>
  <meta charset="UTF-8">
  <title>EduScroll - Smart Quiz</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;500;700;800&display=swap" rel="stylesheet">
  
  <style>
    :root {
      --bg-dark: #050505;
      --accent: #10b981; 
      --accent-quiz: #3b82f6; 
      --wrong: #ef4444; 
      --text-main: #ffffff;
      --text-muted: #94a3b8;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

    html, body {
      width: 100%; height: 100%;
      background-color: var(--bg-dark);
      color: var(--text-main);
      font-family: 'Outfit', sans-serif;
      overflow: hidden; 
    }

    .feed-container {
      height: 100vh; width: 100vw;
      overflow-y: scroll;
      scroll-snap-type: y mandatory;
      -webkit-overflow-scrolling: touch;
      scrollbar-width: none; 
      -ms-overflow-style: none; 
    }
    .feed-container::-webkit-scrollbar { display: none; }

    .snap-card {
      height: 100vh; width: 100vw;
      scroll-snap-align: start;
      scroll-snap-stop: always; 
      position: relative;
    }

    .fact-card, .quiz-card {
      width: 100%; height: 100%;
      display: flex; flex-direction: column; justify-content: center;
      padding: 15% 8%; 
    }

    .fact-card { background-image: radial-gradient(circle at top right, rgba(16, 185, 129, 0.15) 0%, var(--bg-dark) 70%); }
    .quiz-card { background-image: radial-gradient(circle at top left, rgba(59, 130, 246, 0.15) 0%, var(--bg-dark) 70%); }

    .category-badge {
      color: var(--accent); font-size: 0.95rem; font-weight: 800;
      text-transform: uppercase; letter-spacing: 2px;
      margin-bottom: 25px; display: flex; align-items: center; gap: 10px;
    }
    .category-badge::before {
      content: ''; display: block; width: 10px; height: 10px;
      background: var(--accent); border-radius: 50%;
      box-shadow: 0 0 10px var(--accent);
    }
    
    .quiz-badge { color: var(--accent-quiz); }
    .quiz-badge::before { background: var(--accent-quiz); box-shadow: 0 0 10px var(--accent-quiz); }

    .question {
      font-size: 1.8rem; font-weight: 800; line-height: 1.3;
      margin-bottom: 35px; color: var(--text-main);
    }
    .answer {
      font-size: 1.3rem; color: var(--text-muted); line-height: 1.6; font-weight: 300;
      padding-left: 20px; border-left: 4px solid rgba(16, 185, 129, 0.6);
    }

    .quiz-options { display: flex; flex-direction: column; gap: 12px; width: 100%; }
    
    .quiz-btn {
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.1);
      color: var(--text-main);
      padding: 18px 20px; border-radius: 16px;
      font-size: 1.1rem; text-align: left; font-family: inherit;
      cursor: pointer; transition: 0.2s;
      width: 100%; line-height: 1.4;
    }
    .quiz-btn:active { transform: scale(0.97); }
    
    .quiz-btn.correct { background: rgba(16, 185, 129, 0.2) !important; border-color: var(--accent) !important; color: var(--accent); font-weight: bold;}
    .quiz-btn.wrong { background: rgba(239, 68, 68, 0.2) !important; border-color: var(--wrong) !important; color: var(--wrong); }

    .explanation {
      display: none; 
      margin-top: 25px; padding: 20px;
      background: rgba(255, 255, 255, 0.05);
      border-radius: 16px; font-size: 1.05rem;
      color: var(--text-muted); line-height: 1.5;
      border-left: 4px solid var(--accent-quiz);
      animation: fadeIn 0.3s ease;
    }

    .close-btn {
      position: fixed; top: 20px; right: 20px;
      background: rgba(255,255,255,0.1); width: 40px; height: 40px;
      border-radius: 50%; display: grid; place-items: center;
      text-decoration: none; color: white; font-size: 1.2rem;
      z-index: 1000; backdrop-filter: blur(5px); border: 1px solid rgba(255,255,255,0.1);
    }

    .swipe-hint {
      position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%);
      color: rgba(255,255,255,0.4); font-size: 0.95rem; font-weight: 500;
      display: flex; flex-direction: column; align-items: center; gap: 8px;
      animation: bounce 2s infinite; pointer-events: none; text-transform: uppercase; letter-spacing: 1px;
    }

    @keyframes bounce {
      0%, 20%, 50%, 80%, 100% { transform: translate(-50%, 0); }
      40% { transform: translate(-50%, -10px); }
      60% { transform: translate(-50%, -5px); }
    }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px);} to { opacity: 1; transform: translateY(0); } }
  </style>
</head>
<body>

  <a href="index.html" class="close-btn">✕</a>
  <div class="feed-container" id="feed"></div>

  <script>
    // --- BAZA DE DATE SMART ---
    // Eu (AI-ul) îți voi genera mereu aceste variante greșite plauzibile din același domeniu.
    const facts = [
      { 
        category: "Drept Civil", 
        q: "Care sunt atributele dreptului de proprietate?", 
        a: "Posesia, Folosința și Dispoziția.",
        wrongOptions: ["Uzul, Abitația și Servitutea", "Posesia, Detenția și Uzufructul", "Folosința, Înstrăinarea și Administrarea"],
        expl: "Dreptul de proprietate este singurul drept real complet, oferind toate cele 3 atribute: ius possidendi, ius utendi/fruendi și ius abutendi."
      },
      { 
        category: "Finanțe", 
        q: "Ce sancțiune atrage nerespectarea formei 'ad validitatem'?", 
        a: "Nulitatea absolută a actului juridic.",
        wrongOptions: ["Nulitatea relativă a actului juridic", "Inopozabilitatea față de terți", "Decăderea din dreptul de a cere executarea silită"],
        expl: "Forma 'ad validitatem' este o condiție de valabilitate; în lipsa ei, actul nu poate lua naștere în mod valabil, deci sancțiunea este mereu nulitatea absolută."
      },
      { 
        category: "D.I.E.", 
        q: "Cine poate demite Comisia Europeană în ansamblul ei?", 
        a: "Parlamentul European (prin moțiune de cenzură).",
        wrongOptions: ["Consiliul European (cu vot în unanimitate)", "Curtea de Justiție a Uniunii Europene", "Președintele Consiliului Uniunii Europene"],
        expl: "Doar Parlamentul European exercită controlul democratic și are puterea de a demite Comisia în bloc printr-o moțiune de cenzură."
      },
      { 
        category: "Finanțe", 
        q: "Ce semnifică principiul universalității bugetare?", 
        a: "Veniturile și cheltuielile figurează în sume brute, fără a se compensa între ele.",
        wrongOptions: ["Toate bugetele locale sunt incluse în bugetul de stat", "Veniturile realizate se alocă exact pentru cheltuielile din același domeniu", "Bugetul se aprobă de către un parlament bicameral"],
        expl: "Universalitatea interzice compensarea. Nu ai voie să scazi cheltuielile dintr-un venit și să treci în buget doar profitul/pierderea netă."
      },
      { 
        category: "Drept Civil", 
        q: "Ce atrage eroarea asupra identității persoanei (intuitu personae)?", 
        a: "Nulitatea relativă (anularea) actului.",
        wrongOptions: ["Nulitatea absolută", "Rezolutiunea contractului", "Rezilierea contractului de plin drept"],
        expl: "Eroarea (viciu de consimțământ) ocrotește un interes privat, prin urmare sancțiunea este mereu nulitatea relativă, putând fi invocată doar de partea aflată în eroare."
      }
    ];

    const QUIZ_INTERVAL = 3; 

    // Funcție amestecare
    function shuffleArray(array) {
      let arr = [...array];
      for (let i = arr.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [arr[i], arr[j]] = [arr[j], arr[i]];
      }
      return arr;
    }

    const feedContainer = document.getElementById('feed');
    let shuffledFacts = shuffleArray(facts);
    
    let factCounter = 0;
    let recentFactsCache = []; 

    shuffledFacts.forEach((fact, index) => {
      // 1. GENERĂM CARDUL CURENT (Informația)
      const factCard = document.createElement('div');
      factCard.className = 'snap-card';
      const hintHTML = index === 0 ? `<div class="swipe-hint"><span>Swipe sus</span><span>^</span></div>` : '';

      factCard.innerHTML = `
        <div class="fact-card">
          <div class="category-badge">${fact.category}</div>
          <div class="question">${fact.q}</div>
          <div class="answer">${fact.a}</div>
        </div>
        ${hintHTML}
      `;
      feedContainer.appendChild(factCard);
      
      recentFactsCache.push(fact);
      factCounter++;

      // 2. LA FIECARE X SCROLL-URI, GENERĂM UN TEST SURPRIZĂ
      if (factCounter % QUIZ_INTERVAL === 0 && recentFactsCache.length > 0) {
        
        // Alegem un concept din cele recent citite
        const targetFact = recentFactsCache[Math.floor(Math.random() * recentFactsCache.length)];
        const explanationId = 'expl-' + index;

        // Unim răspunsul corect cu capcanele SCRISE INTELIGENT de mine
        let allOptions = [targetFact.a, ...targetFact.wrongOptions];
        // Le amestecăm ca să nu fie a) mereu corect
        allOptions = shuffleArray(allOptions);
        
        const correctIndex = allOptions.indexOf(targetFact.a);

        const quizCard = document.createElement('div');
        quizCard.className = 'snap-card';

        let optionsHTML = '';
        allOptions.forEach((opt, optIndex) => {
          optionsHTML += `<button class="quiz-btn" onclick="checkQuizAnswer(this, ${optIndex === correctIndex}, '${explanationId}')">${opt}</button>`;
        });

        quizCard.innerHTML = `
          <div class="quiz-card">
            <div class="category-badge quiz-badge">🧠 Recapitulează ce ai citit</div>
            <div class="question">${targetFact.q}</div>
            <div class="quiz-options">
              ${optionsHTML}
            </div>
            <div class="explanation" id="${explanationId}">
              <b>Reține:</b> ${targetFact.expl}
            </div>
          </div>
        `;
        
        feedContainer.appendChild(quizCard);
        recentFactsCache = []; // Golim memoria pentru următoarea serie
      }
    });

    // --- FUNCȚIA DE VERIFICARE ---
    window.checkQuizAnswer = function(buttonClicked, isCorrect, explanationId) {
      const parentDiv = buttonClicked.parentElement;
      const allButtons = parentDiv.querySelectorAll('.quiz-btn');
      
      allButtons.forEach(btn => btn.style.pointerEvents = 'none');

      if (isCorrect) {
        buttonClicked.classList.add('correct');
      } else {
        buttonClicked.classList.add('wrong');
        // Dacă greșește, îi arătăm explicația clară
        document.getElementById(explanationId).style.display = 'block';
        
        const correctBtnIndex = Array.from(allButtons).findIndex(btn => btn.getAttribute('onclick').includes('true'));
        if(correctBtnIndex !== -1) {
            allButtons[correctBtnIndex].classList.add('correct');
        }
      }
    };
  </script>
</body>
</html>
