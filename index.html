<!DOCTYPE html>
<html lang="ro">
<head>
  <meta charset="UTF-8">
  <title>EduScroll - Full Screen</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;500;700;800&display=swap" rel="stylesheet">
  
  <style>
    :root {
      --bg-dark: #050505;
      --accent: #10b981; /* Verde pentru fapte */
      --accent-quiz: #3b82f6; /* Albastru pentru quiz */
      --wrong: #ef4444; /* Roșu */
      --text-main: #ffffff;
      --text-muted: #94a3b8;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

    html, body {
      width: 100%; height: 100%;
      background-color: var(--bg-dark);
      color: var(--text-main);
      font-family: 'Outfit', sans-serif;
      overflow: hidden; 
    }

    /* Containerul Scroll Edge-to-Edge */
    .feed-container {
      height: 100vh; width: 100vw;
      overflow-y: scroll;
      scroll-snap-type: y mandatory;
      -webkit-overflow-scrolling: touch;
      scrollbar-width: none; 
      -ms-overflow-style: none; 
    }
    .feed-container::-webkit-scrollbar { display: none; }

    /* Fiecare ecran ocupă exact 100% din telefon */
    .snap-card {
      height: 100vh; width: 100vw;
      scroll-snap-align: start;
      scroll-snap-stop: always; 
      position: relative;
    }

    /* BAZA PENTRU ECRANE (Fără margini, fără border-radius) */
    .fact-card, .quiz-card {
      width: 100%; height: 100%;
      display: flex; flex-direction: column; justify-content: center;
      padding: 15% 8%; /* Spațiu generos pe laterale și sus/jos */
    }

    /* Fundal specific Fapte */
    .fact-card {
      background-image: radial-gradient(circle at top right, rgba(16, 185, 129, 0.15) 0%, var(--bg-dark) 70%);
    }

    /* Fundal specific Teste */
    .quiz-card {
      background-image: radial-gradient(circle at top left, rgba(59, 130, 246, 0.15) 0%, var(--bg-dark) 70%);
    }

    .category-badge {
      color: var(--accent); font-size: 0.95rem; font-weight: 800;
      text-transform: uppercase; letter-spacing: 2px;
      margin-bottom: 25px; display: flex; align-items: center; gap: 10px;
    }
    .category-badge::before {
      content: ''; display: block; width: 10px; height: 10px;
      background: var(--accent); border-radius: 50%;
      box-shadow: 0 0 10px var(--accent);
    }
    
    .quiz-badge { color: var(--accent-quiz); }
    .quiz-badge::before { background: var(--accent-quiz); box-shadow: 0 0 10px var(--accent-quiz); }

    .question {
      font-size: 1.8rem; font-weight: 800; line-height: 1.3;
      margin-bottom: 35px; color: var(--text-main);
    }
    .answer {
      font-size: 1.3rem; color: var(--text-muted); line-height: 1.6; font-weight: 300;
      padding-left: 20px; border-left: 4px solid rgba(16, 185, 129, 0.6);
    }

    /* Opțiunile pentru Quiz */
    .quiz-options {
      display: flex; flex-direction: column; gap: 12px; width: 100%;
    }
    .quiz-btn {
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.1);
      color: var(--text-main);
      padding: 18px 20px; border-radius: 16px;
      font-size: 1.1rem; text-align: left; font-family: inherit;
      cursor: pointer; transition: 0.2s;
      width: 100%; line-height: 1.4;
    }
    .quiz-btn:active { transform: scale(0.97); }
    
    .quiz-btn.correct { background: rgba(16, 185, 129, 0.2) !important; border-color: var(--accent) !important; color: var(--accent); font-weight: bold;}
    .quiz-btn.wrong { background: rgba(239, 68, 68, 0.2) !important; border-color: var(--wrong) !important; color: var(--wrong); }

    .explanation {
      display: none; 
      margin-top: 25px; padding: 20px;
      background: rgba(255, 255, 255, 0.05);
      border-radius: 16px; font-size: 1.05rem;
      color: var(--text-muted); line-height: 1.5;
      border-left: 4px solid var(--accent-quiz);
      animation: fadeIn 0.3s ease;
    }

    /* BUTON IEȘIRE STILIZAT DISCRET */
    .close-btn {
      position: fixed; top: 20px; right: 20px;
      background: rgba(255,255,255,0.1); width: 40px; height: 40px;
      border-radius: 50%; display: grid; place-items: center;
      text-decoration: none; color: white; font-size: 1.2rem;
      z-index: 1000; backdrop-filter: blur(5px); border: 1px solid rgba(255,255,255,0.1);
    }

    .swipe-hint {
      position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%);
      color: rgba(255,255,255,0.4); font-size: 0.95rem; font-weight: 500;
      display: flex; flex-direction: column; align-items: center; gap: 8px;
      animation: bounce 2s infinite; pointer-events: none; text-transform: uppercase; letter-spacing: 1px;
    }

    @keyframes bounce {
      0%, 20%, 50%, 80%, 100% { transform: translate(-50%, 0); }
      40% { transform: translate(-50%, -10px); }
      60% { transform: translate(-50%, -5px); }
    }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px);} to { opacity: 1; transform: translateY(0); } }
  </style>
</head>
<body>

  <a href="index.html" class="close-btn">✕</a>

  <div class="feed-container" id="feed">
    </div>

  <script>
    // --- BAZA DE DATE: INFORMAȚII ---
    const facts = [
      { category: "Drept Civil", q: "Atributele dreptului de proprietate", a: "Dreptul de proprietate conferă titularului său trei atribute esențiale: Posesia, Folosința și Dispoziția." },
      { category: "Finanțe", q: "Nerespectarea formei 'ad validitatem'", a: "Atrage întotdeauna sancțiunea nulității absolute a actului juridic, deoarece forma este cerută pentru însăși valabilitatea sa." },
      { category: "D.I.E.", q: "Aplicabilitatea directă a unei Directive", a: "Se recunoaște doar dacă dispozițiile ei sunt clare, precise, neafectate de condiții și dacă nu a fost transpusă în legislația națională." },
      { category: "Drept Civil", q: "Eroarea asupra identității persoanei (intuitu personae)", a: "Este considerată o eroare esențială și atrage sancțiunea nulității relative (anularea) actului juridic." },
      { category: "Finanțe", q: "Efectul imobilizării fondurilor de investiții", a: "Un nivel cât mai scăzut al acestui indicator exprimă o eficiență economică ridicată (banii se recuperează rapid)." },
      { category: "D.I.E.", q: "Comisia Europeană (Demisie)", a: "Comisia Europeană în ansamblul ei poate fi demisă doar de către Parlamentul European, prin adoptarea unei moțiuni de cenzură." },
      { category: "Finanțe", q: "Principiul universalității bugetare", a: "Presupune ca veniturile și cheltuielile să figureze în buget în sumele lor totale (brute), fără a se compensa veniturile cu cheltuielile." }
    ];

    // --- BAZA DE DATE: TESTE SURPRIZĂ ---
    const quizzes = [
      {
        category: "Test Surpriză: Civil",
        question: "Ce sancțiune intervine dacă nu se respectă forma 'ad validitatem' a unui act?",
        options: ["Nulitatea relativă", "Nulitatea absolută", "Inopozabilitatea"],
        correctIndex: 1, 
        explanation: "Forma 'ad validitatem' este o condiție de valabilitate. Lipsa ei atrage mereu nulitatea absolută."
      },
      {
        category: "Test Surpriză: D.I.E.",
        question: "Cine poate demite Comisia Europeană în ansamblul ei?",
        options: ["Consiliul European", "Curtea de Justiție", "Parlamentul European", "Niciuna din cele de mai sus"],
        correctIndex: 2,
        explanation: "Parlamentul European este singura instituție care are puterea de a demite Comisia prin moțiune de cenzură."
      },
      {
        category: "Test Surpriză: Finanțe",
        question: "Un nivel SCĂZUT al 'efectului imobilizării fondurilor' înseamnă:",
        options: ["O eficiență economică ridicată", "O eficiență economică scăzută", "Faliment"],
        correctIndex: 0,
        explanation: "Cu cât fondurile stau imobilizate (blocate) mai puțin timp, cu atât eficiența investiției este mai mare."
      }
    ];

    const QUIZ_INTERVAL = 3; 

    function shuffleArray(array) {
      let arr = [...array];
      for (let i = arr.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [arr[i], arr[j]] = [arr[j], arr[i]];
      }
      return arr;
    }

    const feedContainer = document.getElementById('feed');
    let shuffledFacts = shuffleArray(facts);
    let shuffledQuizzes = shuffleArray(quizzes);
    let factCounter = 0;

    shuffledFacts.forEach((fact, index) => {
      const factCard = document.createElement('div');
      factCard.className = 'snap-card';
      const hintHTML = index === 0 ? `<div class="swipe-hint"><span>Swipe sus</span><span>^</span></div>` : '';

      factCard.innerHTML = `
        <div class="fact-card">
          <div class="category-badge">${fact.category}</div>
          <div class="question">${fact.q}</div>
          <div class="answer">${fact.a}</div>
        </div>
        ${hintHTML}
      `;
      feedContainer.appendChild(factCard);
      factCounter++;

      if (factCounter % QUIZ_INTERVAL === 0 && shuffledQuizzes.length > 0) {
        const quiz = shuffledQuizzes.pop(); 
        const explanationId = 'expl-' + index;

        const quizCard = document.createElement('div');
        quizCard.className = 'snap-card';

        let optionsHTML = '';
        quiz.options.forEach((opt, optIndex) => {
          optionsHTML += `<button class="quiz-btn" onclick="checkQuizAnswer(this, ${optIndex === quiz.correctIndex}, '${explanationId}')">${opt}</button>`;
        });

        quizCard.innerHTML = `
          <div class="quiz-card">
            <div class="category-badge quiz-badge">🧠 ${quiz.category}</div>
            <div class="question">${quiz.question}</div>
            <div class="quiz-options">
              ${optionsHTML}
            </div>
            <div class="explanation" id="${explanationId}">
              <b>Reține:</b> ${quiz.explanation}
            </div>
          </div>
        `;
        
        feedContainer.appendChild(quizCard);
      }
    });

    window.checkQuizAnswer = function(buttonClicked, isCorrect, explanationId) {
      const parentDiv = buttonClicked.parentElement;
      const allButtons = parentDiv.querySelectorAll('.quiz-btn');
      allButtons.forEach(btn => btn.style.pointerEvents = 'none');

      if (isCorrect) {
        buttonClicked.classList.add('correct');
      } else {
        buttonClicked.classList.add('wrong');
        document.getElementById(explanationId).style.display = 'block';
        
        const correctBtnIndex = Array.from(allButtons).findIndex(btn => btn.getAttribute('onclick').includes('true'));
        if(correctBtnIndex !== -1) {
            allButtons[correctBtnIndex].classList.add('correct');
        }
      }
    };
  </script>
</body>
</html>
